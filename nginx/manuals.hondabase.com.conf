server {
    listen 80;
    listen [::]:80;
    server_name manuals.hondabase.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name manuals.hondabase.com;

    ssl_certificate /etc/letsencrypt/live/manuals.hondabase.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manuals.hondabase.com/privkey.pem;

    include snippets/ssl-params.conf;

    root /var/www/manuals.hondabase.com;
    index index.html index.php;

    location / {
        # Check for direct file ($uri), then an index.html in the directory ($uri/index.html)
        # If neither exists, fall back to our custom PHP explorer (/index.php)
        try_files $uri $uri/index.html /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }
}
